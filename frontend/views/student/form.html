<div class="form-card">
    <h3 class="form-card__title">{{editingStudent ? 'Edit student' : 'Add student'}}</h3>
    <div class="grid">
        <div class="field">
            <label>Name <span class="req">*</span></label>
            <input type="text" placeholder="Full name" ng-model="newStudent.name" />
            <span class="hint">3–16 characters</span>
            <p class="err">{{errors.name}}</p>
        </div>
        <div class="field">
            <label>Email <span class="req">*</span></label>
            <input type="email" placeholder="name@example.com" ng-model="newStudent.email" />
            <p class="err">{{errors.email}}</p>
        </div>
        <div class="field">
            <label>Course <span class="req">*</span></label>
            <select ng-model="newStudent.course">
                <option value="" disabled selected>Select course…</option>
                <option>B.Tech CSE</option>
                <option>BBA</option>
                <option>B.Sc Physics</option>
                <option>B.Com</option>
                <option>BA English</option>
            </select>
            <p class="err">{{errors.course}}</p>
        </div>
        <div class="field">
            <label>Year <span class="req">*</span></label>
            <input type="number" min="1900" max="2026" placeholder="2024" ng-model="newStudent.year" />
            <span class="hint">1900 – current year</span>
            <p class="err">{{errors.year}}</p>
        </div>
    </div>
    <div class="form-actions">
        <button class="btn btn--ghost" ng-click="cancelStudentForm()">Cancel</button>
        <button class="btn btn--primary" ng-click="saveStudent()">{{editingStudent ? 'Update' : 'Add
            student'}}</button>
    </div>
</div>
